<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Light AR Panel</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
  :root {
    color-scheme: dark;
    --ink: #071013;
    --glass: rgba(10, 19, 22, 0.76);
    --line: rgba(210, 236, 228, 0.22);
    --text: #f4fbf7;
    --muted: #9fb0a8;
    --cyan: #7ee7ff;
    --mint: #7ff2b4;
    --amber: #ffd166;
    --red: #ff6b6b;
  }

  * { box-sizing: border-box; }
  html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: var(--ink); color: var(--text); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  button, input { font: inherit; }
  #ar-root { position: fixed; inset: 0; }

  .hud {
    position: fixed;
    left: 50%;
    bottom: max(18px, env(safe-area-inset-bottom));
    width: min(430px, calc(100vw - 24px));
    transform: translateX(-50%);
    z-index: 20;
    display: grid;
    gap: 12px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: linear-gradient(150deg, rgba(16, 30, 34, 0.88), rgba(8, 12, 16, 0.82));
    box-shadow: 0 18px 54px rgba(0, 0, 0, 0.38);
    backdrop-filter: blur(18px);
    display: none;
  }

  .head { display: flex; justify-content: space-between; gap: 14px; align-items: start; }
  .title { margin: 0; font-size: 18px; letter-spacing: 0; }
  .subtitle { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
  .pill { border: 1px solid var(--line); border-radius: 999px; padding: 6px 10px; color: var(--muted); font: 12px ui-monospace, SFMono-Regular, Consolas, monospace; }
  .pill.on { color: var(--mint); }
  .pill.off { color: var(--red); }

  .metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
  .metric { min-width: 0; border: 1px solid var(--line); border-radius: 12px; padding: 9px; background: rgba(255, 255, 255, 0.045); }
  .metric span { display: block; color: var(--muted); font-size: 10px; }
  .metric strong { display: block; margin-top: 5px; font-size: 15px; overflow-wrap: anywhere; }

  .controls { display: grid; grid-template-columns: 155px 1fr; gap: 14px; align-items: end; }
  .arc {
    position: relative;
    width: 155px;
    height: 92px;
    overflow: hidden;
    border-radius: 155px 155px 0 0;
  }
  .arc input {
    position: absolute;
    inset: 0;
    width: 155px;
    height: 155px;
    margin: 0;
    opacity: 0.01;
    cursor: pointer;
  }
  .arc-face {
    position: absolute;
    left: 0;
    bottom: -63px;
    width: 155px;
    height: 155px;
    border-radius: 50%;
    background: conic-gradient(from 270deg, #ff4f5e, #ffd166, #53e37d, #48c7ff, #8f6bff, #ff4f5e);
  }
  .arc.warm .arc-face { background: conic-gradient(from 270deg, #ff8b3d, #ffe3a4, #f8fbff, #79d8ff); }
  .arc-face::after {
    content: "";
    position: absolute;
    inset: 26px;
    border-radius: 50%;
    background: rgba(7, 16, 19, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.12);
  }
  .arc-readout {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 10px;
    z-index: 2;
    text-align: center;
    color: var(--text);
    font: 700 21px ui-monospace, SFMono-Regular, Consolas, monospace;
  }

  .stack { display: grid; gap: 10px; }
  label { display: grid; gap: 7px; color: var(--muted); font-size: 12px; }
  input[type="range"] { width: 100%; accent-color: var(--cyan); }
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .switch {
    min-height: 42px;
    display: flex;
    align-items: center;
    gap: 9px;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 7px 9px;
    background: rgba(255, 255, 255, 0.07);
    color: var(--text);
    cursor: pointer;
  }
  .switch input { position: absolute; opacity: 0; pointer-events: none; }
  .switch span {
    position: relative;
    width: 38px;
    height: 22px;
    border-radius: 999px;
    background: rgba(126, 231, 255, 0.25);
    border: 1px solid var(--line);
  }
  .switch span::after {
    content: "";
    position: absolute;
    top: 3px;
    left: 3px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--cyan);
    transition: transform 160ms ease, background 160ms ease;
  }
  .switch input:checked + span::after { transform: translateX(16px); background: var(--amber); }
  .switch b { font-size: 12px; font-weight: 650; }
  button {
    min-height: 42px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.07);
    color: var(--text);
    cursor: pointer;
  }
  button.primary { background: linear-gradient(135deg, rgba(126, 231, 255, 0.3), rgba(127, 242, 180, 0.22)); }
  button:disabled { opacity: 0.55; cursor: not-allowed; }
  .error { min-height: 16px; color: var(--red); font-size: 12px; }
  .target-note {
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    z-index: 19;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: rgba(0, 0, 0, 0.45);
    color: var(--muted);
    font: 12px ui-monospace, SFMono-Regular, Consolas, monospace;
  }

  @media (max-width: 420px) {
    .controls { grid-template-columns: 1fr; }
    .arc { margin-inline: auto; }
    .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
</style>
</head>
<body>
<div id="ar-root"></div>
<div id="targetNote" class="target-note">Find reference target</div>

<section class="hud" aria-label="Light controls">
  <div class="head">
    <div>
      <h1 class="title">Light panel</h1>
      <p class="subtitle">MindAR target: center + 10 cm</p>
    </div>
    <div id="powerPill" class="pill">unknown</div>
  </div>

  <div class="metrics">
    <div class="metric"><span>Mode</span><strong id="modeText">-</strong></div>
    <div class="metric"><span>Brightness</span><strong id="brightnessText">-</strong></div>
    <div class="metric"><span>Temp</span><strong id="temperatureText">-</strong></div>
    <div class="metric"><span>Hue</span><strong id="hueText">-</strong></div>
  </div>

  <div class="controls">
    <label id="arcLabel">Hue
      <div id="arc" class="arc">
        <div class="arc-face"></div>
        <input id="arcInput" type="range" min="0" max="360" value="240">
        <div id="arcReadout" class="arc-readout">240</div>
      </div>
    </label>

    <div class="stack">
      <label>Brightness
        <input id="brightnessInput" type="range" min="1" max="100" value="80">
      </label>
      <div class="actions">
        <label class="switch">
          <input id="modeSwitch" type="checkbox">
          <span></span>
          <b id="modeSwitchText">Colour</b>
        </label>
        <button id="powerButton" class="primary" type="button">Toggle power</button>
      </div>
    </div>
  </div>

  <div id="errorText" class="error"></div>
</section>

<script type="module">
import * as THREE from "three";
import { MindARThree } from "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js";

const API_KEY = "nKG9DR0Cyef6yK12E2X0ICZkNdp-Ds2d1-HFbzHJ5J4";
const API_BASE = "https://api.iiishop.top";
const WEATHER_URL = "https://wttr.in/52.1927803,-1.70634?format=j1";
const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
const clamp = (value, min, max) => Math.min(max, Math.max(min, Number(value)));

const ui = {
  note: document.getElementById("targetNote"),
  powerPill: document.getElementById("powerPill"),
  modeText: document.getElementById("modeText"),
  brightnessText: document.getElementById("brightnessText"),
  temperatureText: document.getElementById("temperatureText"),
  hueText: document.getElementById("hueText"),
  arc: document.getElementById("arc"),
  arcLabel: document.getElementById("arcLabel"),
  arcInput: document.getElementById("arcInput"),
  arcReadout: document.getElementById("arcReadout"),
  brightnessInput: document.getElementById("brightnessInput"),
  modeSwitch: document.getElementById("modeSwitch"),
  modeSwitchText: document.getElementById("modeSwitchText"),
  powerButton: document.getElementById("powerButton"),
  errorText: document.getElementById("errorText")
};

function mapCheckingResult(value) {
  return ({
    checking: "Checking",
    check_success: "Normal",
    check_failure: "Check failed",
    others: "Unknown",
    comm_fault: "Communication fault",
    radar_fault: "Radar fault"
  })[value] || "Unknown";
}

const state = {
  light: null,
  occupancy: null,
  occupancyUpdatedAt: null,
  weather: null,
  weatherUpdatedAt: null,
  mode: "colour",
  powerOverride: null,
  busy: false,
  commandQueue: Promise.resolve(),
  queuedCommands: 0,
  board: null,
  boardTexture: null,
  boardZones: {},
  occupancyBoard: null,
  occupancyTexture: null,
  weatherBoard: null,
  weatherTexture: null,
  targetVisible: false,
  panelPlaced: false,
  smoothGroup: null,
  camera: null,
  tempPosition: new THREE.Vector3(),
  tempQuaternion: new THREE.Quaternion(),
  tempScale: new THREE.Vector3(),
  parentQuaternion: new THREE.Quaternion(),
  cameraQuaternion: new THREE.Quaternion(),
  raycaster: new THREE.Raycaster(),
  pointer: new THREE.Vector2(),
  activeControl: null,
  controlCommitTimer: null,
  lastQueuedControlKey: "",
  dragStartX: 0,
  dragStartValue: 0
};

async function apiRequest(path, options = {}) {
  const url = new URL(`${API_BASE}${path}`);
  if (!options.body) url.searchParams.set("_", Date.now());
  const response = await fetch(url, {
    ...options,
    cache: "no-store",
    headers: {
      "X-API-Key": API_KEY,
      ...(options.body ? { "Content-Type": "application/json" } : {})
    }
  });
  let data = null;
  try { data = await response.json(); } catch { data = null; }
  if (!response.ok) throw new Error(data?.detail || `Request failed: ${response.status}`);
  return data;
}

const TuyaApi = {
  getLightStatus: () => apiRequest("/api/devices/light/status"),
  getOccupancyStatus: () => apiRequest("/api/devices/occupancy/status"),
  setLightPower: (on) => apiRequest("/api/devices/light/commands", {
    method: "POST",
    body: JSON.stringify({ action: "set_power", on })
  }),
  setLightWhite: (brightness, temperature) => apiRequest("/api/devices/light/commands", {
    method: "POST",
    body: JSON.stringify({
      action: "set_white",
      brightness_percent: clamp(brightness, 1, 100),
      temperature_percent: clamp(temperature, 0, 100)
    })
  }),
  setLightColor: (hue, saturation, brightness) => apiRequest("/api/devices/light/commands", {
    method: "POST",
    body: JSON.stringify({
      action: "set_color",
      hue: clamp(hue, 0, 360),
      saturation_percent: clamp(saturation, 0, 100),
      brightness_percent: clamp(brightness, 1, 100)
    })
  })
};

function getBrightness(light) {
  return light?.mode === "colour"
    ? light.color?.brightness_percent
    : light?.brightness_percent;
}

function displayValues() {
  const light = state.light || {};
  return {
    power: light.power,
    brightness: Math.round(Number(ui.brightnessInput.value) || getBrightness(light) || 80),
    temp: Math.round(Number(state.mode === "white" ? ui.arcInput.value : light.temperature_percent) || 0),
    hue: Math.round(Number(state.mode === "colour" ? ui.arcInput.value : light.color?.hue) || 0)
  };
}

function drawBoard() {
  if (!state.board) return;
  const { canvas, ctx } = state.board.userData;
  const { power, brightness, temp, hue } = displayValues();
  const accent = state.mode === "white" ? "#ffd166" : `hsl(${hue} 95% 60%)`;
  const zones = {
    mode: { x: 34, y: 332, w: 164, h: 58, hitX: 18, hitY: 312, hitW: 196, hitH: 96 },
    power: { x: 220, y: 332, w: 172, h: 58, hitX: 204, hitY: 312, hitW: 206, hitH: 96 },
    brightness: { x: 455, y: 346, w: 255, h: 28, hitY: 318, hitH: 92 },
    arc: { cx: 590, cy: 244, r: 100, hitR: 135 }
  };
  state.boardZones = zones;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "rgba(7, 16, 19, 0.86)";
  ctx.roundRect(0, 0, canvas.width, canvas.height, 28);
  ctx.fill();
  ctx.strokeStyle = "rgba(210, 236, 228, 0.25)";
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.fillStyle = "rgba(244, 251, 247, 0.06)";
  ctx.fillRect(0, 0, canvas.width, 84);
  ctx.fillStyle = "#9fb0a8";
  ctx.font = "22px ui-monospace, monospace";
  ctx.fillText("ray control", 34, 50);

  ctx.fillStyle = accent;
  ctx.beginPath();
  ctx.arc(72, 168, 42, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "#f4fbf7";
  ctx.font = "700 40px system-ui, sans-serif";
  ctx.fillText(`Light ${power ? "on" : "off"}`, 132, 146);
  ctx.font = "600 28px ui-monospace, monospace";
  ctx.fillText(`${state.mode}  ${brightness}%`, 132, 192);
  ctx.fillStyle = "#9fb0a8";
  ctx.font = "23px ui-monospace, monospace";
  ctx.fillText(`temp ${temp}%   hue ${hue}deg`, 132, 235);

  const arc = zones.arc;
  ctx.lineWidth = 24;
  drawRotatingArc(ctx, arc, state.mode === "white" ? temp : hue);
  ctx.fillStyle = "rgba(7, 16, 19, 0.9)";
  ctx.beginPath();
  ctx.arc(arc.cx, arc.cy, 64, Math.PI, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = "#f4fbf7";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(arc.cx, arc.cy - arc.r - 26);
  ctx.lineTo(arc.cx, arc.cy - 58);
  ctx.stroke();
  ctx.fillStyle = "#f4fbf7";
  ctx.font = "700 34px ui-monospace, monospace";
  ctx.fillText(state.mode === "white" ? `${temp}` : `${hue}`, arc.cx - 34, arc.cy - 20);

  drawButton(ctx, zones.mode, state.mode === "white" ? "White" : "Colour", state.mode === "white" ? "#ffd166" : "#7ee7ff");
  drawButton(ctx, zones.power, power ? "Turn off" : "Turn on", power ? "#ff6b6b" : "#7ff2b4");

  const track = zones.brightness;
  ctx.fillStyle = "rgba(255,255,255,0.12)";
  ctx.beginPath();
  ctx.roundRect(track.x, track.y, track.w, track.h, 14);
  ctx.fill();
  ctx.fillStyle = accent;
  ctx.beginPath();
  ctx.roundRect(track.x, track.y, track.w * brightness / 100, track.h, 14);
  ctx.fill();
  ctx.fillStyle = "#f4fbf7";
  ctx.font = "700 24px ui-monospace, monospace";
  ctx.fillText(`${brightness}%`, track.x + track.w + 16, track.y + 23);

  state.boardTexture.needsUpdate = true;
}

function drawRotatingArc(ctx, arc, value) {
  const max = state.mode === "white" ? 100 : 360;
  const centerAngle = Math.PI * 1.5;
  for (let i = 0; i < 72; i += 1) {
    const a0 = Math.PI + i * Math.PI / 72;
    const a1 = Math.PI + (i + 1) * Math.PI / 72;
    const offset = (a0 + a1) / 2 - centerAngle;
    const raw = value + offset / Math.PI * max;
    const v = state.mode === "white" ? clamp(raw, 0, max) : (raw % max + max) % max;
    ctx.strokeStyle = state.mode === "white"
      ? `hsl(${32 + v / max * 168} 100% ${58 + v / max * 28}%)`
      : `hsl(${v} 95% 60%)`;
    ctx.beginPath();
    ctx.arc(arc.cx, arc.cy, arc.r, a0, a1 + 0.01);
    ctx.stroke();
  }
}

function drawButton(ctx, zone, label, color) {
  ctx.save();
  ctx.fillStyle = "rgba(255,255,255,0.08)";
  ctx.beginPath();
  ctx.roundRect(zone.x, zone.y, zone.w, zone.h, 16);
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.fillStyle = "#f4fbf7";
  ctx.font = "800 31px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.lineWidth = 5;
  ctx.strokeStyle = "rgba(0, 0, 0, 0.75)";
  ctx.strokeText(label, zone.x + zone.w / 2, zone.y + zone.h / 2);
  ctx.fillText(label, zone.x + zone.w / 2, zone.y + zone.h / 2);
  ctx.restore();
}

function rawValue(data, ...keys) {
  for (const key of keys) {
    if (data?.[key] != null) return data[key];
    if (data?.raw?.[key] != null) return data.raw[key];
    const item = Array.isArray(data?.raw) && data.raw.find((entry) => entry.code === key);
    if (item?.value != null) return item.value;
  }
  return null;
}

function metres(value) {
  if (value == null) return "-";
  return `${Number(value).toFixed(2)} m`;
}

function seconds(value) {
  return value == null ? "-" : `${Number(value)} s`;
}

function drawOccupancyBoard() {
  if (!state.occupancyBoard) return;
  const { canvas, ctx } = state.occupancyBoard.userData;
  const data = state.occupancy || {};
  const occupied = data.occupied === true;
  const closestRaw = rawValue(data, "target_dis_closest", "closest_distance", "closest_distance_cm");
  const nearRaw = rawValue(data, "near_detection");
  const farRaw = rawValue(data, "far_detection");
  const closest = data.closest_distance_m ?? (closestRaw == null ? null : closestRaw / 100);
  const near = data.near_detection_m ?? (nearRaw == null ? null : nearRaw / 100);
  const far = data.far_detection_m ?? (farRaw == null ? null : farRaw / 100);
  const rows = [
    ["Presence state", data.presence_state ?? rawValue(data, "presence_state") ?? "-"],
    ["Sensitivity", data.sensitivity ?? "-"],
    ["Target distance", metres(closest)],
    ["Nearest range", metres(near)],
    ["Farthest range", metres(far)],
    ["Self check", mapCheckingResult(data.checking_result)]
  ];

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "rgba(7, 16, 19, 0.86)";
  ctx.beginPath();
  ctx.roundRect(0, 0, canvas.width, canvas.height, 28);
  ctx.fill();
  ctx.strokeStyle = "rgba(210, 236, 228, 0.25)";
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.fillStyle = occupied ? "#7ff2b4" : "#8fa3ad";
  ctx.beginPath();
  ctx.arc(58, 58, 26, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "#f4fbf7";
  ctx.font = "800 34px sans-serif";
  ctx.fillText(occupied ? "OCCUPIED" : "CLEAR", 104, 58);
  ctx.fillStyle = "#9fb0a8";
  ctx.font = "22px ui-monospace, monospace";
  ctx.fillText(mapCheckingResult(data.checking_result), 104, 92);
  ctx.fillText(state.occupancyUpdatedAt ? `Updated ${state.occupancyUpdatedAt.toLocaleTimeString()}` : "Waiting for data", 44, 410);

  rows.forEach(([label, value], index) => {
    const y = 145 + index * 38;
    ctx.fillStyle = "rgba(255,255,255,0.06)";
    ctx.beginPath();
    ctx.roundRect(28, y - 25, canvas.width - 56, 31, 10);
    ctx.fill();
    ctx.fillStyle = "#9fb0a8";
    ctx.font = "20px sans-serif";
    ctx.fillText(label, 44, y);
    ctx.fillStyle = "#f4fbf7";
    ctx.font = "700 22px ui-monospace, monospace";
    ctx.textAlign = "right";
    ctx.fillText(String(value), canvas.width - 44, y);
    ctx.textAlign = "left";
  });

  state.occupancyTexture.needsUpdate = true;
}

function drawWeatherBoard() {
  if (!state.weatherBoard) return;
  const { canvas, ctx } = state.weatherBoard.userData;
  const current = state.weather?.current_condition?.[0] || {};
  const outdoor = current.temp_C == null ? null : Number(current.temp_C);
  const indoor = outdoor == null ? null : outdoor + 3;
  const humidity = current.humidity;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "rgba(7, 16, 19, 0.86)";
  ctx.beginPath();
  ctx.roundRect(0, 0, canvas.width, canvas.height, 28);
  ctx.fill();
  ctx.strokeStyle = "rgba(210, 236, 228, 0.25)";
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.fillStyle = "#ffd166";
  ctx.beginPath();
  ctx.arc(58, 58, 26, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "#f4fbf7";
  ctx.font = "800 32px sans-serif";
  ctx.fillText("ROOM SENSOR", 104, 58);
  ctx.fillStyle = "#9fb0a8";
  ctx.font = "20px ui-monospace, monospace";
  ctx.fillText("Stratford-upon-Avon", 104, 92);
  ctx.fillText(state.weatherUpdatedAt ? `Updated ${state.weatherUpdatedAt.toLocaleTimeString()}` : "Waiting for data", 44, 270);

  const rows = [
    ["Temperature", indoor == null ? "-" : `${indoor.toFixed(1)} C`],
    ["Humidity", humidity == null ? "-" : `${humidity}%`]
  ];
  rows.forEach(([label, value], index) => {
    const y = 155 + index * 54;
    ctx.fillStyle = "rgba(255,255,255,0.06)";
    ctx.beginPath();
    ctx.roundRect(28, y - 34, canvas.width - 56, 42, 12);
    ctx.fill();
    ctx.fillStyle = "#9fb0a8";
    ctx.font = "22px sans-serif";
    ctx.fillText(label, 44, y);
    ctx.fillStyle = "#f4fbf7";
    ctx.font = "800 28px ui-monospace, monospace";
    ctx.textAlign = "right";
    ctx.fillText(String(value), canvas.width - 44, y);
    ctx.textAlign = "left";
  });

  state.weatherTexture.needsUpdate = true;
}

function render() {
  const light = state.light || {};
  const keepLocal = state.queuedCommands > 0 || state.activeControl;
  const brightness = Math.round(keepLocal ? ui.brightnessInput.value : (getBrightness(light) || ui.brightnessInput.value));
  const temp = Math.round(keepLocal ? ui.arcInput.value : (light.temperature_percent || 0));
  const hue = Math.round(keepLocal ? ui.arcInput.value : (light.color?.hue || ui.arcInput.value));

  ui.powerPill.textContent = light.power == null ? "unknown" : (light.power ? "on" : "off");
  ui.powerPill.className = `pill ${light.power ? "on" : "off"}`;
  ui.modeText.textContent = state.mode;
  ui.brightnessText.textContent = `${brightness}%`;
  ui.temperatureText.textContent = `${temp}%`;
  ui.hueText.textContent = `${hue}deg`;
  ui.brightnessInput.value = brightness;
  ui.arcInput.max = state.mode === "white" ? 100 : 360;
  ui.arcInput.value = state.mode === "white" ? temp : hue;
  ui.arcReadout.textContent = ui.arcInput.value;
  ui.arc.classList.toggle("warm", state.mode === "white");
  ui.arcLabel.firstChild.textContent = state.mode === "white" ? "Temperature" : "Hue";
  ui.modeSwitch.checked = state.mode === "white";
  ui.modeSwitchText.textContent = state.mode === "white" ? "White" : "Colour";
  ui.powerButton.textContent = light.power ? "Turn off" : "Turn on";
  drawBoard();
  drawOccupancyBoard();
  drawWeatherBoard();
}

async function refreshLight({ forceSync = false } = {}) {
  try {
    const light = await TuyaApi.getLightStatus();
    if (forceSync || (state.queuedCommands === 0 && !state.activeControl)) {
      state.powerOverride = null;
      state.light = light;
      state.mode = light.mode === "white" ? "white" : "colour";
    } else {
      state.light = state.powerOverride == null ? light : { ...light, power: state.powerOverride };
    }
    ui.errorText.textContent = "";
  } catch (error) {
    ui.errorText.textContent = error.message;
  }
  render();
}

async function refreshOccupancy() {
  try {
    state.occupancy = await TuyaApi.getOccupancyStatus();
    state.occupancyUpdatedAt = new Date();
  } catch (error) {
    ui.errorText.textContent = error.message;
  }
  drawOccupancyBoard();
}

async function refreshWeather() {
  try {
    const response = await fetch(WEATHER_URL, { cache: "no-store" });
    if (!response.ok) throw new Error(`Weather request failed: ${response.status}`);
    state.weather = await response.json();
    state.weatherUpdatedAt = new Date();
  } catch (error) {
    ui.errorText.textContent = error.message;
  }
  drawWeatherBoard();
}

async function runCommand(fn) {
  state.queuedCommands += 1;
  state.busy = true;
  ui.powerButton.disabled = true;
  ui.modeSwitch.disabled = true;
  render();
  state.commandQueue = state.commandQueue.then(async () => {
    try {
      await fn();
      await sleep(600);
    } catch (error) {
      ui.errorText.textContent = error.message;
    } finally {
      state.queuedCommands -= 1;
      state.busy = state.queuedCommands > 0;
      ui.powerButton.disabled = state.busy;
      ui.modeSwitch.disabled = state.busy;
      if (state.queuedCommands === 0) await refreshLight({ forceSync: true });
      else render();
    }
  });
  return state.commandQueue;
}

function currentControlCommand() {
  const brightness = Number(ui.brightnessInput.value);
  const arc = Number(ui.arcInput.value);
  const mode = state.mode;
  return () => mode === "white"
    ? TuyaApi.setLightWhite(brightness, arc)
    : TuyaApi.setLightColor(arc, 100, brightness);
}

function queueCurrentControlCommand() {
  const key = `${state.mode}:${ui.brightnessInput.value}:${ui.arcInput.value}`;
  if (key === state.lastQueuedControlKey) return;
  state.lastQueuedControlKey = key;
  runCommand(currentControlCommand());
}

function scheduleControlCommit() {
  clearTimeout(state.controlCommitTimer);
  state.controlCommitTimer = setTimeout(queueCurrentControlCommand, 300);
}

function createBoard() {
  const canvas = document.createElement("canvas");
  canvas.width = 768;
  canvas.height = 420;
  const texture = new THREE.CanvasTexture(canvas);
  const board = new THREE.Mesh(
    new THREE.PlaneGeometry(0.54, 0.30),
    new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide })
  );
  board.position.set(-0.76, 0, 0.10);
  board.userData = { canvas, ctx: canvas.getContext("2d") };
  state.board = board;
  state.boardTexture = texture;
  drawBoard();
  return board;
}

function createOccupancyBoard() {
  const canvas = document.createElement("canvas");
  canvas.width = 560;
  canvas.height = 430;
  const texture = new THREE.CanvasTexture(canvas);
  const board = new THREE.Mesh(
    new THREE.PlaneGeometry(0.40, 0.31),
    new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide })
  );
  board.position.set(0, -0.96, 0.10);
  board.userData = { canvas, ctx: canvas.getContext("2d") };
  state.occupancyBoard = board;
  state.occupancyTexture = texture;
  drawOccupancyBoard();
  return board;
}

function createWeatherBoard() {
  const canvas = document.createElement("canvas");
  canvas.width = 500;
  canvas.height = 300;
  const texture = new THREE.CanvasTexture(canvas);
  const board = new THREE.Mesh(
    new THREE.PlaneGeometry(0.36, 0.22),
    new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide })
  );
  board.position.set(0.76, 0, 0.10);
  board.userData = { canvas, ctx: canvas.getContext("2d") };
  state.weatherBoard = board;
  state.weatherTexture = texture;
  drawWeatherBoard();
  return board;
}

ui.arcInput.addEventListener("input", () => {
  ui.arcReadout.textContent = ui.arcInput.value;
});
ui.arcInput.addEventListener("change", () => runCommand(currentControlCommand()));
ui.brightnessInput.addEventListener("change", () => runCommand(currentControlCommand()));
ui.modeSwitch.addEventListener("change", () => {
  state.mode = ui.modeSwitch.checked ? "white" : "colour";
  render();
  runCommand(currentControlCommand());
});
ui.powerButton.addEventListener("click", () => {
  const nextPower = !state.light?.power;
  state.powerOverride = nextPower;
  state.light = { ...state.light, power: nextPower };
  render();
  runCommand(() => TuyaApi.setLightPower(nextPower));
});

function hitZone(zone, x, y) {
  const x0 = zone.hitX ?? zone.x;
  const y0 = zone.hitY ?? zone.y;
  const w = zone.hitW ?? zone.w;
  const h = zone.hitH ?? zone.h;
  return x >= x0 && x <= x0 + w && y >= y0 && y <= y0 + h;
}

function hitArc(x, y) {
  const arc = state.boardZones.arc;
  return x >= arc.cx - arc.hitR && x <= arc.cx + arc.hitR && y >= arc.cy - arc.hitR - 28 && y <= arc.cy + 52;
}

function setBrightnessFromHit(x) {
  const zone = state.boardZones.brightness;
  const ratio = Math.max(0, Math.min(1, (x - zone.x) / zone.w));
  ui.brightnessInput.value = Math.round(1 + ratio * 99);
  render();
  scheduleControlCommit();
}

function setArcFromHit(x, y) {
  const max = Number(ui.arcInput.max);
  const next = state.dragStartValue - (x - state.dragStartX) * max / 260;
  ui.arcInput.value = Math.round(state.mode === "white" ? clamp(next, 0, max) : (next % max + max) % max);
  render();
  scheduleControlCommit();
}

function handleBoardHit(x, y, commitContinuous = true) {
  const zones = state.boardZones;
  if (hitZone(zones.power, x, y)) {
    const nextPower = !state.light?.power;
    state.powerOverride = nextPower;
    state.light = { ...state.light, power: nextPower };
    render();
    runCommand(() => TuyaApi.setLightPower(nextPower));
    return;
  }
  if (hitZone(zones.mode, x, y)) {
    state.mode = state.mode === "white" ? "colour" : "white";
    render();
    runCommand(currentControlCommand());
    return;
  }
  if (hitZone(zones.brightness, x, y)) {
    state.activeControl = "brightness";
    setBrightnessFromHit(x);
    if (commitContinuous) queueCurrentControlCommand();
    return;
  }
  if (hitArc(x, y)) {
    state.activeControl = "arc";
    state.dragStartX = x;
    state.dragStartValue = Number(ui.arcInput.value);
    setArcFromHit(x, y);
    if (commitContinuous) queueCurrentControlCommand();
  }
}

function bindRayInteraction(renderer, camera) {
  const getBoardPoint = (event) => {
    if (!state.panelPlaced || !state.board) return;
    const rect = renderer.domElement.getBoundingClientRect();
    state.pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    state.pointer.y = -(((event.clientY - rect.top) / rect.height) * 2 - 1);
    state.smoothGroup.updateMatrixWorld(true);
    state.board.updateMatrixWorld(true);
    state.raycaster.setFromCamera(state.pointer, camera);
    const hit = state.raycaster.intersectObject(state.board, true)[0];
    if (!hit?.uv) return;
    const { canvas } = state.board.userData;
    return { x: hit.uv.x * canvas.width, y: (1 - hit.uv.y) * canvas.height };
  };
  const updateDrag = (event) => {
    const point = getBoardPoint(event);
    if (!point) return false;
    if (state.activeControl === "brightness") setBrightnessFromHit(point.x);
    if (state.activeControl === "arc") setArcFromHit(point.x, point.y);
    return true;
  };
  const hitPanel = (event) => {
    const point = getBoardPoint(event);
    if (!point) return;
    event.preventDefault();
    renderer.domElement.setPointerCapture?.(event.pointerId);
    handleBoardHit(point.x, point.y, false);
  };

  renderer.domElement.style.touchAction = "none";
  window.addEventListener("pointerdown", hitPanel, { capture: true, passive: false });
  window.addEventListener("pointermove", (event) => {
    if (!state.activeControl) return;
    event.preventDefault();
    updateDrag(event);
  }, { capture: true, passive: false });
  window.addEventListener("pointerup", (event) => {
    if (!state.activeControl) return;
    event.preventDefault();
    updateDrag(event);
    clearTimeout(state.controlCommitTimer);
    queueCurrentControlCommand();
    state.activeControl = null;
  }, { capture: true, passive: false });
  window.addEventListener("pointercancel", () => {
    if (!state.activeControl) return;
    clearTimeout(state.controlCommitTimer);
    queueCurrentControlCommand();
    state.activeControl = null;
  }, { capture: true, passive: false });
}

function updateSmoothedAnchor(anchor) {
  if (!state.targetVisible || !state.smoothGroup) return;
  anchor.group.updateMatrixWorld(true);
  anchor.group.matrixWorld.decompose(state.tempPosition, state.tempQuaternion, state.tempScale);
  state.smoothGroup.position.lerp(state.tempPosition, 0.18);
  state.smoothGroup.quaternion.slerp(state.tempQuaternion, 0.18);
  state.smoothGroup.scale.lerp(state.tempScale, 0.18);
}

function facePanelsToCamera() {
  if (!state.panelPlaced || !state.smoothGroup || !state.camera) return;
  state.smoothGroup.getWorldQuaternion(state.parentQuaternion).invert();
  state.camera.getWorldQuaternion(state.cameraQuaternion);
  for (const panel of [state.board, state.occupancyBoard, state.weatherBoard]) {
    panel?.quaternion.copy(state.parentQuaternion).multiply(state.cameraQuaternion);
  }
}

async function startAr() {
  const mindar = new MindARThree({
    container: document.getElementById("ar-root"),
    imageTargetSrc: "./targets.mind",
    filterMinCF: 0.0005,
    filterBeta: 10,
    warmupTolerance: 5,
    missTolerance: 5
  });
  const { renderer, scene, camera } = mindar;
  state.camera = camera;
  const anchor = mindar.addAnchor(0);
  state.smoothGroup = new THREE.Group();
  state.smoothGroup.visible = false;
  state.smoothGroup.add(createBoard());
  state.smoothGroup.add(createOccupancyBoard());
  state.smoothGroup.add(createWeatherBoard());
  scene.add(state.smoothGroup);
  anchor.onTargetFound = () => {
    state.targetVisible = true;
    state.panelPlaced = true;
    state.smoothGroup.visible = true;
    anchor.group.updateMatrixWorld(true);
    anchor.group.matrixWorld.decompose(state.smoothGroup.position, state.smoothGroup.quaternion, state.smoothGroup.scale);
    ui.note.textContent = "Tap the AR panel";
  };
  anchor.onTargetLost = () => {
    state.targetVisible = false;
    ui.note.textContent = state.panelPlaced ? "Panel locked, find target to recalibrate" : "Find reference target";
  };

  await mindar.start();
  bindRayInteraction(renderer, camera);
  renderer.setAnimationLoop(() => {
    updateSmoothedAnchor(anchor);
    facePanelsToCamera();
    renderer.render(scene, camera);
  });
}

refreshLight();
refreshOccupancy();
refreshWeather();
setInterval(refreshLight, 8000);
setInterval(refreshOccupancy, 1000);
setInterval(refreshWeather, 600000);
startAr().catch((error) => {
  ui.note.textContent = `AR error: ${error.message}`;
});
</script>
</body>
</html>
